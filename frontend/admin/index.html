<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#26215C">
<title>Admin — Escola Profética</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:#26215C;--mid:#534AB7;--accent:#7F77DD;--light:#EEEDFE;--pale:#F5F4FF;
  --ink:#1a1a2e;--muted:#6B6890;--cream:#FAF9FF;
  --sage:#0F6E56;--sage-light:#E1F5EE;
  --borda:rgba(127,119,221,0.18);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--deep),var(--mid));padding:20px}
.login-card{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:380px;
  box-shadow:0 24px 64px rgba(0,0,0,0.3)}
.login-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--deep);
  margin-bottom:4px;text-align:center}
.login-sub{font-size:0.8rem;color:var(--muted);text-align:center;margin-bottom:24px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--borda);border-radius:10px;
  font-size:0.95rem;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;
  background:var(--pale);margin-bottom:12px;transition:border-color 0.2s}
.inp:focus{border-color:var(--accent)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--mid),var(--deep));border:none;
  color:#fff;padding:14px;border-radius:12px;font-size:0.95rem;font-weight:700;
  font-family:'DM Sans',sans-serif;cursor:pointer;min-height:48px}
.login-erro{background:#FFF0F0;color:#C0392B;font-size:0.8rem;padding:10px;
  border-radius:8px;text-align:center;margin-top:10px;display:none}

/* HEADER ADMIN */
.admin-header{background:var(--deep);padding:14px 24px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid rgba(127,119,221,0.2);
  position:sticky;top:0;z-index:100}
.admin-logo{font-family:'Playfair Display',serif;color:#fff;font-size:1rem}
.admin-logo em{color:var(--accent);font-style:normal}
.btn-sair{background:transparent;border:1px solid rgba(127,119,221,0.3);color:rgba(255,255,255,0.6);
  font-size:0.75rem;padding:5px 12px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* LAYOUT */
.admin-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 52px)}
.sidebar{background:#fff;border-right:1px solid var(--borda);padding:20px 0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 20px;
  font-size:0.85rem;color:var(--muted);cursor:pointer;transition:all 0.2s;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--pale);color:var(--mid)}
.sidebar-item.active{background:var(--light);color:var(--mid);border-left-color:var(--accent);font-weight:600}
.sidebar-icon{font-size:1rem;flex-shrink:0}
.sidebar-section{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);padding:16px 20px 6px}

/* CONTEÚDO */
.admin-content{padding:28px 32px;max-width:900px}
.page-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--deep);margin-bottom:4px}
.page-sub{font-size:0.82rem;color:var(--muted);margin-bottom:24px}

/* CARDS STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:#fff;border:1px solid var(--borda);border-radius:14px;padding:16px 18px}
.stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--mid);font-weight:700}
.stat-label{font-size:0.75rem;color:var(--muted);margin-top:2px}

/* TABELA */
.table-wrap{background:#fff;border:1px solid var(--borda);border-radius:14px;overflow:hidden;margin-bottom:20px}
.table-header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--borda)}
.table-title{font-size:0.85rem;font-weight:600;color:var(--ink)}
.btn-add{font-size:0.78rem;padding:6px 14px;border-radius:8px;
  background:var(--mid);color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
table{width:100%;border-collapse:collapse}
th{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--muted);padding:10px 18px;text-align:left;border-bottom:1px solid var(--borda);
  background:var(--pale)}
td{font-size:0.83rem;color:var(--ink);padding:12px 18px;border-bottom:1px solid var(--borda)}
tr:last-child td{border:none}
tr:hover td{background:var(--pale)}
.badge-ativo{background:var(--sage-light);color:var(--sage);font-size:0.68rem;
  padding:2px 8px;border-radius:20px;font-weight:700}
.badge-inativo{background:#FFF0F0;color:#C0392B;font-size:0.68rem;
  padding:2px 8px;border-radius:20px;font-weight:700}
.btn-edit{font-size:0.72rem;padding:4px 10px;border-radius:6px;
  border:1px solid var(--borda);background:transparent;color:var(--muted);cursor:pointer}
.btn-edit:hover{background:var(--light);color:var(--mid)}
.btn-del{font-size:0.72rem;padding:4px 10px;border-radius:6px;
  border:1px solid rgba(192,57,43,0.2);background:transparent;color:#C0392B;cursor:pointer}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:200;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:640px;
  max-height:90vh;overflow-y:auto;animation:fadeUp 0.3s ease}
.modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--deep);margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--muted);display:block;margin-bottom:6px}
.form-inp{width:100%;padding:10px 12px;border:1.5px solid var(--borda);border-radius:8px;
  font-size:0.88rem;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;
  background:var(--pale);transition:border-color 0.2s}
.form-inp:focus{border-color:var(--accent)}
.form-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--borda);border-radius:8px;
  font-size:0.88rem;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;
  background:var(--pale);resize:vertical;min-height:100px;line-height:1.6}
.form-textarea:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancelar{font-size:0.85rem;padding:9px 18px;border-radius:8px;
  border:1px solid var(--borda);background:transparent;color:var(--muted);cursor:pointer}
.btn-salvar{font-size:0.85rem;padding:9px 20px;border-radius:8px;
  background:var(--mid);color:#fff;border:none;cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif}

/* CAPITULOS */
.cap-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.cap-item{background:var(--pale);border:1px solid var(--borda);border-radius:10px;
  padding:12px 14px;display:flex;align-items:center;gap:10px}
.cap-num-badge{width:28px;height:28px;border-radius:50%;background:var(--light);
  color:var(--mid);display:flex;align-items:center;justify-content:center;
  font-size:0.78rem;font-weight:700;flex-shrink:0}
.cap-info{flex:1}
.cap-titulo-text{font-size:0.85rem;font-weight:600;color:var(--ink)}
.cap-meta-text{font-size:0.72rem;color:var(--muted);margin-top:2px}

.spinner{width:32px;height:32px;border:2px solid var(--borda);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--deep);color:#fff;padding:9px 20px;border-radius:40px;
  font-size:0.82rem;z-index:999;white-space:nowrap;animation:fadeUp 0.3s ease;pointer-events:none}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:0.85rem}

/* ALUNOS */
.aluno-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--borda)}
.aluno-row:last-child{border:none}
.aluno-avatar{width:34px;height:34px;border-radius:50%;background:var(--light);
  color:var(--mid);display:flex;align-items:center;justify-content:center;
  font-size:0.85rem;font-weight:700;flex-shrink:0}
.aluno-info{flex:1}
.aluno-email{font-size:0.83rem;font-weight:500;color:var(--ink)}
.aluno-data{font-size:0.7rem;color:var(--muted)}

@media(max-width:700px){
  .admin-layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .stats-grid{grid-template-columns:1fr 1fr}
  .admin-content{padding:16px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-title">⚙️ Admin</div>
    <div class="login-sub">Escola Profética — Painel de Gestão</div>
    <input class="inp" type="password" id="senhaAdmin" placeholder="Senha de administrador"
      onkeydown="if(event.key==='Enter')fazerLogin()">
    <button class="btn-login" onclick="fazerLogin()">Entrar no painel</button>
    <div class="login-erro" id="loginErro">Senha incorreta</div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp" style="display:none">
  <div class="admin-header">
    <div class="admin-logo">Escola <em>Profética</em> · Admin</div>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>

  <div class="admin-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section">Gestão</div>
      <div class="sidebar-item active" onclick="navegar('dashboard',this)">
        <span class="sidebar-icon">📊</span> Dashboard
      </div>
      <div class="sidebar-item" onclick="navegar('modulos',this)">
        <span class="sidebar-icon">📚</span> Módulos
      </div>
      <div class="sidebar-item" onclick="navegar('capitulos',this)">
        <span class="sidebar-icon">📖</span> Capítulos
      </div>
      <div class="sidebar-section">Importar</div>
      <div class="sidebar-item" onclick="navegar('importar',this)">
        <span class="sidebar-icon">⬆️</span> Importar JSON
      </div>
      <div class="sidebar-section">Comunidade</div>
      <div class="sidebar-item" onclick="navegar('alunos',this)">
        <span class="sidebar-icon">👥</span> Alunos
      </div>
      <div class="sidebar-item" onclick="navegar('comentarios',this)">
        <span class="sidebar-icon">💬</span> Comentários
      </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="admin-content" id="adminContent">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- MODAL MÓDULO -->
<div class="modal-bg" id="modalModulo">
  <div class="modal">
    <div class="modal-title" id="modalModuloTitle">Novo Módulo</div>
    <input type="hidden" id="mEditId">
    <div class="form-group">
      <label class="form-label">ID do módulo (sem espaços, ex: apostasia)</label>
      <input class="form-inp" id="mId" placeholder="apostasia">
    </div>
    <div class="form-group">
      <label class="form-label">Título</label>
      <input class="form-inp" id="mTitulo" placeholder="A Apostasia dos Últimos Dias">
    </div>
    <div class="form-group">
      <label class="form-label">Descrição curta</label>
      <input class="form-inp" id="mDesc" placeholder="Breve descrição do módulo">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nº de capítulos</label>
        <input class="form-inp" id="mCaps" type="number" value="3" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Duração (minutos)</label>
        <input class="form-inp" id="mMin" type="number" value="40" min="5">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Ordem</label>
        <input class="form-inp" id="mOrdem" type="number" value="1" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-inp" id="mAtivo">
          <option value="true">Ativo (visível)</option>
          <option value="false">Inativo (oculto)</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancelar" onclick="fecharModal('modalModulo')">Cancelar</button>
      <button class="btn-salvar" onclick="salvarModulo()">Salvar módulo</button>
    </div>
  </div>
</div>

<!-- MODAL CAPÍTULO -->
<div class="modal-bg" id="modalCapitulo">
  <div class="modal">
    <div class="modal-title" id="modalCapTitle">Novo Capítulo</div>
    <input type="hidden" id="cEditId">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Módulo</label>
        <select class="form-inp" id="cModuloId"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Número do capítulo</label>
        <input class="form-inp" id="cNumero" type="number" value="1" min="1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Título do capítulo</label>
      <input class="form-inp" id="cTitulo" placeholder="O que é Apostasia nas Escrituras?">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Versículo âncora (texto)</label>
        <input class="form-inp" id="cAncoraTexto" placeholder="Texto do versículo...">
      </div>
      <div class="form-group">
        <label class="form-label">Referência (ex: 1 Tm 4:1)</label>
        <input class="form-inp" id="cAncoraRef" placeholder="1 Timóteo 4:1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Introdução do capítulo</label>
      <textarea class="form-textarea" id="cIntro" placeholder="Parágrafo introdutório do capítulo..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Seção 1 — Título</label>
      <input class="form-inp" id="cSec1Titulo" placeholder="Título da primeira seção">
    </div>
    <div class="form-group">
      <label class="form-label">Seção 1 — Texto</label>
      <textarea class="form-textarea" id="cSec1Texto" style="min-height:80px" placeholder="Conteúdo da primeira seção..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Seção 1 — Versículo</label>
        <input class="form-inp" id="cSec1VersTexto" placeholder="Texto do versículo">
      </div>
      <div class="form-group">
        <label class="form-label">Seção 1 — Referência</label>
        <input class="form-inp" id="cSec1VersRef" placeholder="Ex: João 3:16">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Seção 2 — Título</label>
      <input class="form-inp" id="cSec2Titulo" placeholder="Título da segunda seção">
    </div>
    <div class="form-group">
      <label class="form-label">Seção 2 — Texto</label>
      <textarea class="form-textarea" id="cSec2Texto" style="min-height:80px" placeholder="Conteúdo da segunda seção..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Seção 2 — Versículo</label>
        <input class="form-inp" id="cSec2VersTexto" placeholder="Texto do versículo">
      </div>
      <div class="form-group">
        <label class="form-label">Seção 2 — Referência</label>
        <input class="form-inp" id="cSec2VersRef" placeholder="Ex: Mateus 24:12">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Reflexões (uma por linha)</label>
      <textarea class="form-textarea" id="cReflexoes" style="min-height:70px"
        placeholder="Você consegue identificar...&#10;Qual a diferença entre..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Ação da semana</label>
      <textarea class="form-textarea" id="cAcao" style="min-height:60px"
        placeholder="Esta semana, leia..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Oração do capítulo</label>
      <textarea class="form-textarea" id="cOracao" style="min-height:70px"
        placeholder="Senhor, guarda meu coração..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancelar" onclick="fecharModal('modalCapitulo')">Cancelar</button>
      <button class="btn-salvar" onclick="salvarCapitulo()">Salvar capítulo</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ttcdhthjtdnudczakuhu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0Y2RodGhqdGRudWRjemFrdWh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNTkxODIsImV4cCI6MjA5NDYzNTE4Mn0.fDVyCS3uj2qIJHDJOqMvRSLhkW_aGC5lXzQnLNdH6AI";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── SENHA ADMIN — TROQUE AQUI ────────────────────────────────────────
const SENHA_ADMIN = "escola2025";

let paginaAtual = "dashboard";
let modulosCache = [];

// ── LOGIN ─────────────────────────────────────────────────────────────
function fazerLogin() {
  const senha = document.getElementById("senhaAdmin").value;
  if (senha === SENHA_ADMIN) {
    sessionStorage.setItem("adminOk", "1");
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("adminApp").style.display = "block";
    navegar("dashboard", document.querySelector(".sidebar-item"));
  } else {
    document.getElementById("loginErro").style.display = "block";
  }
}

function sair() {
  sessionStorage.removeItem("adminOk");
  location.reload();
}

// Verifica se já estava logado
if (sessionStorage.getItem("adminOk") === "1") {
  document.getElementById("loginWrap").style.display = "none";
  document.getElementById("adminApp").style.display = "block";
  setTimeout(() => navegar("dashboard", document.querySelector(".sidebar-item")), 100);
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────────────
function navegar(pagina, el) {
  paginaAtual = pagina;
  document.querySelectorAll(".sidebar-item").forEach(i => i.classList.remove("active"));
  if (el) el.classList.add("active");
  const c = document.getElementById("adminContent");
  c.innerHTML = `<div class="spinner"></div>`;
  const fns = { dashboard: renderDashboard, modulos: renderModulos, capitulos: renderCapitulos, alunos: renderAlunos, comentarios: renderComentarios, importar: renderImportar };
  if (fns[pagina]) fns[pagina]();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────
async function renderDashboard() {
  const c = document.getElementById("adminContent");
  const [modRes, capRes, aluRes] = await Promise.all([
    sb.from("modulos_conteudo").select("*", { count: "exact" }),
    sb.from("capitulos_conteudo").select("*", { count: "exact" }),
    sb.from("purchases").select("*", { count: "exact" }).eq("ativo", true),
  ]);
  const totalMod = modRes.count || 0;
  const totalCap = capRes.count || 0;
  const totalAlu = aluRes.count || 0;

  c.innerHTML = `
  <div class="page-title">Dashboard</div>
  <div class="page-sub">Visão geral da Escola Profética</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${totalMod}</div><div class="stat-label">Módulos cadastrados</div></div>
    <div class="stat-card"><div class="stat-num">${totalCap}</div><div class="stat-label">Capítulos publicados</div></div>
    <div class="stat-card"><div class="stat-num">${totalAlu}</div><div class="stat-label">Alunos com acesso</div></div>
  </div>
  <div class="table-wrap">
    <div class="table-header"><span class="table-title">Módulos publicados</span>
      <button class="btn-add" onclick="abrirModalModulo()">+ Novo módulo</button>
    </div>
    <div id="dashModulosList"><div class="spinner"></div></div>
  </div>`;
  await carregarModulosDash();
}

async function carregarModulosDash() {
  const { data } = await sb.from("modulos_conteudo").select("*").order("ordem");
  modulosCache = data || [];
  const el = document.getElementById("dashModulosList");
  if (!el) return;
  if (!modulosCache.length) { el.innerHTML = `<div class="empty">Nenhum módulo ainda. Clique em "+ Novo módulo" para começar.</div>`; return; }
  el.innerHTML = `<table><thead><tr><th>Ordem</th><th>ID</th><th>Título</th><th>Caps</th><th>Status</th><th>Ações</th></tr></thead><tbody>
  ${modulosCache.map(m => `<tr>
    <td>${m.ordem}</td>
    <td><code style="font-size:0.75rem;background:var(--pale);padding:2px 6px;border-radius:4px">${m.modulo_id}</code></td>
    <td>${m.titulo}</td>
    <td>${m.capitulos}</td>

// ── MODAL MÓDULO ──────────────────────────────────────────────────────
function abrirModalModulo(dados = null) {
  document.getElementById("modalModuloTitle").textContent = dados ? "Editar Módulo" : "Novo Módulo";
  document.getElementById("mEditId").value = dados?.id || "";
  document.getElementById("mId").value = dados?.modulo_id || "";
  document.getElementById("mTitulo").value = dados?.titulo || "";
  document.getElementById("mDesc").value = dados?.descricao || "";
  document.getElementById("mCaps").value = dados?.capitulos || 3;
  document.getElementById("mMin").value = dados?.minutos || 40;
  document.getElementById("mOrdem").value = dados?.ordem || (modulosCache.length + 1);
  document.getElementById("mAtivo").value = dados?.ativo !== false ? "true" : "false";
  document.getElementById("mId").disabled = !!dados;
  document.getElementById("modalModulo").classList.add("show");
}

function editarModulo(id) {
  const m = modulosCache.find(x => x.id === id);
  if (m) abrirModalModulo(m);
}

async function salvarModulo() {
  const id = document.getElementById("mEditId").value;
  const payload = {
    modulo_id: document.getElementById("mId").value.trim().toLowerCase().replace(/\s/g, "_"),
    titulo: document.getElementById("mTitulo").value.trim(),
    descricao: document.getElementById("mDesc").value.trim(),
    capitulos: parseInt(document.getElementById("mCaps").value),
    minutos: parseInt(document.getElementById("mMin").value),
    ordem: parseInt(document.getElementById("mOrdem").value),
    ativo: document.getElementById("mAtivo").value === "true",
  };
  if (!payload.modulo_id || !payload.titulo) { mostrarToast("⚠️ Preencha ID e título"); return; }
  if (id) {
    await sb.from("modulos_conteudo").update(payload).eq("id", id);
  } else {
    await sb.from("modulos_conteudo").insert(payload);
  }
  fecharModal("modalModulo");
  mostrarToast("✓ Módulo salvo!");
  navegar(paginaAtual, null);
}

async function deletarModulo(id, titulo) {
  if (!confirm(`Excluir o módulo "${titulo}"?\n\nIsso também remove todos os capítulos associados.`)) return;
  await sb.from("capitulos_conteudo").delete().eq("modulo_id", modulosCache.find(m => m.id === id)?.modulo_id);
  await sb.from("modulos_conteudo").delete().eq("id", id);
  mostrarToast("✓ Módulo excluído");
  navegar(paginaAtual, null);
}

// ── MODAL CAPÍTULO ────────────────────────────────────────────────────
async function abrirModalCapitulo(dados = null) {
  document.getElementById("modalCapTitle").textContent = dados ? "Editar Capítulo" : "Novo Capítulo";
  document.getElementById("cEditId").value = dados?.id || "";

  // Popula select de módulos
  const { data: mods } = await sb.from("modulos_conteudo").select("modulo_id, titulo").order("ordem");
  const sel = document.getElementById("cModuloId");
  sel.innerHTML = (mods || []).map(m => `<option value="${m.modulo_id}" ${dados?.modulo_id === m.modulo_id ? "selected" : ""}>${m.titulo}</option>`).join("");

  document.getElementById("cNumero").value = dados?.numero || 1;
  document.getElementById("cTitulo").value = dados?.titulo || "";
  document.getElementById("cAncoraTexto").value = dados?.ancora_texto || "";
  document.getElementById("cAncoraRef").value = dados?.ancora_ref || "";

  const con = dados?.conteudo || {};
  document.getElementById("cIntro").value = con.intro || "";
  const s1 = con.secoes?.[0] || {};
  document.getElementById("cSec1Titulo").value = s1.titulo || "";
  document.getElementById("cSec1Texto").value = s1.texto || "";
  document.getElementById("cSec1VersTexto").value = s1.versiculo?.texto || "";
  document.getElementById("cSec1VersRef").value = s1.versiculo?.ref || "";
  const s2 = con.secoes?.[1] || {};
  document.getElementById("cSec2Titulo").value = s2.titulo || "";
  document.getElementById("cSec2Texto").value = s2.texto || "";
  document.getElementById("cSec2VersTexto").value = s2.versiculo?.texto || "";
  document.getElementById("cSec2VersRef").value = s2.versiculo?.ref || "";
  document.getElementById("cReflexoes").value = (con.reflexoes || []).join("\n");
  document.getElementById("cAcao").value = con.acao || "";
  document.getElementById("cOracao").value = con.oracao || "";

  document.getElementById("modalCapitulo").classList.add("show");
}

async function editarCapitulo(id) {
  const { data } = await sb.from("capitulos_conteudo").select("*").eq("id", id).single();
  if (data) abrirModalCapitulo(data);
}

async function salvarCapitulo() {
  const id = document.getElementById("cEditId").value;
  const reflexoesRaw = document.getElementById("cReflexoes").value;
  const reflexoes = reflexoesRaw.split("\n").map(r => r.trim()).filter(Boolean);

  const secoes = [];
  const s1t = document.getElementById("cSec1Titulo").value.trim();
  if (s1t) secoes.push({
    titulo: s1t,
    texto: document.getElementById("cSec1Texto").value.trim(),
    versiculo: document.getElementById("cSec1VersTexto").value.trim() ? {
      texto: document.getElementById("cSec1VersTexto").value.trim(),
      ref: document.getElementById("cSec1VersRef").value.trim()
    } : null
  });
  const s2t = document.getElementById("cSec2Titulo").value.trim();
  if (s2t) secoes.push({
    titulo: s2t,
    texto: document.getElementById("cSec2Texto").value.trim(),
    versiculo: document.getElementById("cSec2VersTexto").value.trim() ? {
      texto: document.getElementById("cSec2VersTexto").value.trim(),
      ref: document.getElementById("cSec2VersRef").value.trim()
    } : null
  });

  const payload = {
    modulo_id: document.getElementById("cModuloId").value,
    numero: parseInt(document.getElementById("cNumero").value),
    titulo: document.getElementById("cTitulo").value.trim(),
    ancora_texto: document.getElementById("cAncoraTexto").value.trim(),
    ancora_ref: document.getElementById("cAncoraRef").value.trim(),
    conteudo: {
      intro: document.getElementById("cIntro").value.trim(),
      secoes, reflexoes,
      acao: document.getElementById("cAcao").value.trim(),
      oracao: document.getElementById("cOracao").value.trim(),
    }
  };

  if (!payload.titulo || !payload.modulo_id) { mostrarToast("⚠️ Preencha módulo e título"); return; }

  if (id) {
    await sb.from("capitulos_conteudo").update(payload).eq("id", id);
  } else {
    await sb.from("capitulos_conteudo").upsert(payload, { onConflict: "modulo_id,numero" });
  }
  fecharModal("modalCapitulo");
  mostrarToast("✓ Capítulo salvo!");
  navegar(paginaAtual, null);
}

async function deletarCapitulo(id, titulo) {
  if (!confirm(`Excluir o capítulo "${titulo}"?`)) return;
  await sb.from("capitulos_conteudo").delete().eq("id", id);
  mostrarToast("✓ Capítulo excluído");
  navegar(paginaAtual, null);
}

function fecharModal(id) { document.getElementById(id).classList.remove("show"); }

// ── IMPORTAR JSON ────────────────────────────────────────────────────
function renderImportar() {
  const c = document.getElementById("adminContent");
  c.innerHTML = `
  <div class="page-title">Importar JSON</div>
  <div class="page-sub">Cole o JSON de um módulo completo e importe tudo de uma vez</div>
  <div class="table-wrap" style="padding:20px">
    <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px">Cole o JSON aqui</div>
    <textarea id="jsonImport" style="width:100%;min-height:280px;padding:12px;border:1.5px solid var(--borda);border-radius:8px;font-family:monospace;font-size:0.8rem;background:var(--pale);color:var(--ink);outline:none;resize:vertical" placeholder='{"modulo": {...}, "capitulos": [...]}'></textarea>
    <div style="display:flex;gap:10px;margin-top:12px;align-items:center">
      <button class="btn-salvar" onclick="processarImport()" style="padding:10px 24px">⬆ Importar tudo</button>
      <button class="btn-cancelar" onclick="document.getElementById('jsonImport').value=''">Limpar</button>
      <span id="importStatus" style="font-size:0.82rem;color:var(--muted)"></span>
    </div>
    <div style="margin-top:20px;padding:14px;background:var(--pale);border-radius:8px;font-size:0.78rem;color:var(--muted);line-height:1.8">
      <strong style="color:var(--ink)">Formato esperado:</strong><br>
      O JSON deve ter a estrutura: <code>{ "modulo": {...}, "capitulos": [{...}, {...}] }</code><br>
      O campo <code>modulo_id</code> é o identificador único (ex: "apostasia", "cavaleiros")<br>
      Se o módulo ou capítulo já existir, será atualizado automaticamente.
    </div>
  </div>`;
}

async function processarImport() {
  const txt = document.getElementById("jsonImport").value.trim();
  const status = document.getElementById("importStatus");
  if (!txt) { status.textContent = "⚠️ Cole o JSON primeiro"; return; }

  let dados;
  try {
    dados = JSON.parse(txt);
  } catch(e) {
    status.textContent = "❌ JSON inválido — verifique a formatação";
    status.style.color = "#C0392B";
    return;
  }

  if (!dados.modulo || !dados.capitulos) {
    status.textContent = "❌ JSON deve ter 'modulo' e 'capitulos'";
    status.style.color = "#C0392B";
    return;
  }

  status.textContent = "⏳ Importando módulo...";
  status.style.color = "var(--muted)";

  try {
    // Salvar módulo
    const { error: modErr } = await sb.from("modulos_conteudo")
      .upsert(dados.modulo, { onConflict: "modulo_id" });

    if (modErr) throw modErr;

    // Salvar capítulos
    status.textContent = `⏳ Importando ${dados.capitulos.length} capítulos...`;
    let ok = 0;
    for (const cap of dados.capitulos) {
      const payload = {
        modulo_id:    dados.modulo.modulo_id,
        numero:       cap.numero,
        titulo:       cap.titulo,
        ancora_texto: cap.ancora_texto,
        ancora_ref:   cap.ancora_ref,
        conteudo:     cap.conteudo
      };
      const { error: capErr } = await sb.from("capitulos_conteudo")
        .upsert(payload, { onConflict: "modulo_id,numero" });
      if (!capErr) ok++;
    }

    status.textContent = `✓ Importado! Módulo "${dados.modulo.titulo}" + ${ok} capítulos.`;
    status.style.color = "var(--sage)";
    document.getElementById("jsonImport").value = "";

  } catch(e) {
    status.textContent = "❌ Erro: " + (e.message || "verifique o console");
    status.style.color = "#C0392B";
    console.error(e);
  }
}

function mostrarToast(msg) {
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
